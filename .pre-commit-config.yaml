# Maturity: Serious — mirrors CI checks that are fast enough for local runs.
# Principle: one tool per concern, every tool earns its seconds.
# Intentionally excluded from pre-commit (run via scripts/quality-gates.sh):
#   pytest+coverage, pip-audit, npm audit
# Repo lint (shellcheck, actionlint, markdownlint): also in CI via scripts/repo-lint.sh
#
# Install (commit + push hooks):
#   uv pip install -e ".[dev]"
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#   # or: bash scripts/install-git-hooks.sh
# Run all (commit stage):  pre-commit run --all-files
# Run push stage only:     pre-commit run pre-push-gates --hook-stage pre-push
# Run fast hook stack on commit by default; pre-push hooks are explicit.
default_stages: [pre-commit]
# Full gates (before PR):  ./scripts/quality-gates.sh
# Full + hygiene sweep:    ./scripts/quality-gates.sh --full

repos:

  # ── Hygiene ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        # Vite/TS configs use comments (JSONC); not valid strict JSON.
        exclude: ^frontend/tsconfig(\.(app|node))?\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1200']
      - id: detect-private-key
      - id: debug-statements

  # ── Shell, GitHub Actions, Markdown ─────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['-x']
        files: ^scripts/.*\.sh$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        files: \.md$
        exclude: |
          (?x)^(
            \.claude/|
            frontend/node_modules/
          )

  # ── Secrets ──────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
        args: [--config, .gitleaks.toml]

  # ── Python SAST (uv bandit — same version as CI) ─────────
  - repo: local
    hooks:
      - id: bandit
        name: bandit SAST (medium+)
        entry: uv run bandit -c pyproject.toml -r server/ cli/ -q -ll
        language: system
        pass_filenames: false
        types: [python]

  # ── Python lint + format (one tool, replaces black+isort+pylint) ─
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Python type check ─────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check (dmypy daemon — warm ~0.5s, cold ~60s first run)
        entry: uv run dmypy run -- server/ cli/
        language: system
        pass_filenames: false
        types: [python]

  # ── Frontend (Vite + React + TypeScript) ─────────────────
  # Uses npm scripts so versions match package-lock.json (run npm ci in frontend/).
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint (eslint)
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$
        exclude: ^frontend/node_modules/
      - id: frontend-typecheck
        name: frontend typecheck (tsc --noEmit)
        entry: npm --prefix frontend run typecheck
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$
        exclude: ^frontend/node_modules/

  # ── Commit: fast tests on changed Python modules only (testmon) ──
  # Skips when no Python files are staged. Uses pytest-testmon to run only
  # tests related to changed source files. First run builds the coverage map
  # (all tests); subsequent runs are incremental (<5s for small changes).
  # Full test suite + coverage enforced at push stage.
  - repo: local
    hooks:
      - id: fast-tests
        name: fast unit tests (changed modules, testmon)
        entry: uv run pytest --testmon -x -q --tb=short --no-header
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

  # ── Pre-push: push-specific checks only (no duplicates from commit) ─
  # Commit stage already ran: ruff, mypy, bandit, eslint, tsc+build, testmon.
  # Push adds: full test suite + coverage, pip-audit, vitest, npm audit.
  - repo: local
    hooks:
      - id: pre-push-gates
        name: pre-push gates (coverage + audits + vitest)
        entry: bash scripts/pre-push-gates.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
