# Maturity: Serious — mirrors CI checks that are fast enough for local runs.
# Principle: one tool per concern, every tool earns its seconds.
# Intentionally excluded from pre-commit (run via scripts/quality-gates.sh):
#   pytest+coverage, pip-audit, npm audit
# Repo lint (shellcheck, actionlint, markdownlint): also in CI via scripts/repo-lint.sh
#
# Install (commit + push hooks):
#   uv pip install -e ".[dev]"
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#   # or: bash scripts/install-git-hooks.sh
# Run all (commit stage):  pre-commit run --all-files
# Run push stage only:     pre-commit run pre-push-gates --hook-stage pre-push
# Full gates (before PR):  ./scripts/quality-gates.sh
# Full + hygiene sweep:    ./scripts/quality-gates.sh --full

repos:
  # ── Hygiene ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        # Vite/TS configs use comments (JSONC); not valid strict JSON.
        exclude: ^frontend/tsconfig(\.(app|node))?\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: debug-statements

  # ── Shell, GitHub Actions, Markdown ─────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        files: \.md$
        exclude: |
          (?x)^(
            \.claude/|
            frontend/node_modules/
          )

  # ── Secrets ──────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
        args: [--config, .gitleaks.toml]

  # ── Python SAST (uv bandit — same version as CI) ─────────
  - repo: local
    hooks:
      - id: bandit
        name: bandit SAST (medium+)
        entry: uv run bandit -c pyproject.toml -r server/ cli/ -q -ll
        language: system
        pass_filenames: false
        types: [python]

  # ── Python lint + format (one tool, replaces black+isort+pylint) ─
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Python type check ─────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: uv run mypy server/ cli/
        language: system
        pass_filenames: false
        types: [python]

  # ── Frontend (Vite + React + TypeScript) ─────────────────
  # Uses npm scripts so versions match package-lock.json (run npm ci in frontend/).
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint (eslint)
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$
        exclude: ^frontend/node_modules/
      - id: frontend-verify
        name: frontend verify (tsc + build)
        entry: npm --prefix frontend run verify
        language: system
        pass_filenames: false
        files: ^frontend/
        exclude: ^frontend/node_modules/

  # ── Pre-push: fast CI gates (pre-rag: Husky → npm run test:all) ─
  - repo: local
    hooks:
      - id: pre-push-gates
        name: pre-push gates (lint, test, verify, secrets)
        entry: bash scripts/pre-push-gates.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
