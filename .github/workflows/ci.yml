name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repo-lint:
    name: Repo lint (shell, workflows, docs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies (pre-commit hooks)
        run: uv pip install --system -e ".[dev]"

      - name: Shellcheck
        run: pre-commit run shellcheck --all-files

      - name: Actionlint
        run: pre-commit run actionlint --all-files

      - name: Markdownlint
        run: pre-commit run markdownlint --all-files

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (including dev)
        run: uv pip install --system -e ".[dev]"

      - name: Cache mypy
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: mypy-${{ runner.os }}-py3.12-

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy server/ cli/

      - name: SAST (bandit, medium+ severity)
        run: bandit -c pyproject.toml -r server/ cli/ -q -ll

      - name: Tests + coverage (unit tier)
        run: |
          pytest --tb=short -q \
            --cov=server.core.search_index_plan \
            --cov=server.core.search_index_guard \
            --cov=server.core.results_analyzer \
            --cov=server.models.config \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Python dependency audit
        run: bash scripts/pip-audit.sh

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Path is relative to repository root (not defaults.run.working-directory).
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
