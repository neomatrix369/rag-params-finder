# MongoDB Atlas — Unified Retrievers Format (NEW)
#
# This example demonstrates the new unified retriever configuration where
# traditional retrieval (dense/sparse/hybrid) and reranking are treated as
# retrievers and swept independently.
#
# Full Cartesian sweep:
#   1 embedding model × 2 chunking methods × 2 chunk sizes × 1 overlap × 4 retrievers
#   = 16 runs (each retriever creates a separate run)
#
# Embedding:  all-MiniLM-L6-v2 (384-dim, local, no API key)
# Chunking:   recursive · semantic
# Retrievers: dense · sparse · hybrid · cross_encoder (swept individually — one per run)
#
# Atlas prerequisites (M0 — create before running sweep):
#   - chunks collection in rag_params_finder database
#   - vector_index_384  + text_search_index
#   See docs/user-guide/cloud-setup.md#before-you-run-a-sweep

experiment_name: example-unified-retrievers

data_paths:
  - ./input_data/pdfs/The_Federal_Pell_Grant_Program.pdf

queries_file: ./configs/questions.example.json

database_provider: mongodb

embedding:
  provider: local
  models:
    - all-MiniLM-L6-v2    # 384-dim, no API key needed

chunking:
  methods:
    - recursive   # LangChain recursive splitter
    - semantic    # Sentence-transformers cosine similarity grouping
  params:
    chunk_sizes: [512, 1024]
    overlaps: [50]

# NEW: Unified retriever configuration
retrieval:
  top_k_initial: 20  # Candidates from traditional retrieval
  top_k_final: 5     # Final results after reranking
  retrievers:
    # Each entry is one sweep dimension — one retriever per run (never combined).
    - type: dense
    - type: sparse   # requires text_search_index
    - type: hybrid
    - type: cross_encoder
      provider: local
      model: cross-encoder/ms-marco-MiniLM-L-6-v2

execution:
  parallelism: 1
  on_error: continue
