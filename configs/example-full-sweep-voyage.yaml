# Full parameter sweep using Voyage AI models — requires VOYAGE_API_KEY in .env
# Narrower params than the local sweep to keep costs reasonable.
# 3 models × 5 chunking methods × 2 chunk_sizes × 1 overlap × 3 retrieval methods = 90 runs.
# Estimated Voyage embedding cost: ~$0.65 total across all models and runs.
#
# Prerequisites:
#   - VOYAGE_API_KEY in .env
#   - vector_index_1024 in Atlas (for Voyage 1024-dim models)
#   - text_search_index in Atlas (for sparse/hybrid retrieval)

experiment_name: full-sweep-voyage

data_paths:
  - ./input_data/pdfs/The_Federal_Pell_Grant_Program.pdf

queries_file: ./configs/questions.example.json

database_provider: mongodb

embedding:
  provider: voyage
  models:
    - voyage-3.5-lite
    - voyage-3.5
    - voyage-context-3

chunking:
  methods:
    - fixed
    - recursive
    - token
    - sentence
    - semantic
  params:
    chunk_sizes: [256, 512]   # narrower than local sweep to control API cost
    overlaps: [50]

retrieval:
  methods:
    - dense
    - sparse
    - hybrid
  top_k_initial: 20
  top_k_final: 5
  rerank_provider: voyage
  rerank_model: rerank-2.5-lite

execution:
  parallelism: 1
  on_error: continue
