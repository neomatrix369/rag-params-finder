experiment_name: my-first-experiment
pdf_path: ./papers/sample.pdf
queries_file: ./configs/questions.example.json

embedding:
  models:
    - voyage-3.5-lite

chunking:
  methods:
    - recursive
  params:
    chunk_sizes: [256, 512, 1024]
    overlaps: [50, 100]

retrieval:
  methods:
    - dense
  top_k_initial: 20
  top_k_final: 5
  rerank_model: rerank-2.5-lite

execution:
  parallelism: 1
  on_error: continue
