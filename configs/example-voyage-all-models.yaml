# Compare all three Voyage AI embedding models on the same document.
# Requires VOYAGE_API_KEY in .env
# Runs 3 models × 3 chunk_sizes × 2 overlaps = 18 runs.
# Estimated Voyage cost: ~$0.07 (voyage-3.5-lite) + ~$0.14 (voyage-3.5) + ~$0.18 (voyage-context-3)

experiment_name: voyage-all-models

data_paths:
  - ./input_data/pdfs/The_Federal_Pell_Grant_Program.pdf

queries_file: ./configs/questions.example.json

database_provider: mongodb

embedding:
  provider: voyage
  models:
    - voyage-3.5-lite      # fastest, cheapest, 1024-dim
    - voyage-3.5           # balanced, 1024-dim
    - voyage-context-3     # best quality, optimised for long contexts, 1024-dim

chunking:
  methods:
    - recursive
  params:
    chunk_sizes: [256, 512, 1024]
    overlaps: [50, 100]

retrieval:
  methods:
    - dense
  top_k_initial: 20
  top_k_final: 5
  rerank_provider: voyage
  rerank_model: rerank-2.5

execution:
  parallelism: 1
  on_error: continue
